<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07182a" />
  <title>SFS Exercise Therapy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       SFS Exercise Therapy — brand system (matches Admin Hub)
       ============================================================ */
    :root{
      --grad-primary: linear-gradient(135deg, #2E7C6D 0%, #4DB0C0 50%, #1689BD 100%);
      --navy-grad:    linear-gradient(135deg, #0d2c3d 0%, #07182a 100%);
      --accent-mint:  #50CFB0;
      --page-bg:      #f4f8f9;
      --ink:          #0d2c3d;
      --ink-soft:     #4a6573;
      --line:         rgba(13,44,61,.06);
      --card-shadow:  0 1px 2px rgba(13,44,61,.04), 0 8px 24px rgba(13,44,61,.06);
      --radius:       18px;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      font-family:'Montserrat',system-ui,-apple-system,sans-serif;
      color:var(--ink);
      background:var(--page-bg);
      background-image:
        radial-gradient(60% 50% at 12% 0%, rgba(80,207,176,.10) 0%, transparent 60%),
        radial-gradient(55% 45% at 100% 8%, rgba(22,137,189,.08) 0%, transparent 60%);
      background-attachment:fixed;
      min-height:100dvh;
      -webkit-font-smoothing:antialiased;
    }

    h1,h2,h3{
      font-family:'Anton',sans-serif;
      text-transform:uppercase;
      letter-spacing:.02em;
      line-height:1.05;
      font-weight:400;
      margin:0;
    }

    /* ---------- buttons ---------- */
    .btn-grad,.btn-ghost{
      font-family:'Montserrat',sans-serif;
      font-weight:700;
      font-size:16px;
      border-radius:14px;
      padding:16px 20px;          /* big mobile tap target */
      min-height:54px;
      width:100%;
      border:0;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }
    .btn-grad{
      color:#fff;
      background:var(--grad-primary);
      box-shadow:0 6px 18px rgba(22,137,189,.28);
    }
    .btn-grad:active{ transform:translateY(1px); }
    .btn-grad:disabled{ opacity:.55; cursor:default; box-shadow:none; }
    .btn-ghost{
      color:var(--ink);
      background:#fff;
      border:1px solid var(--line);
    }
    .linkbtn{
      background:none; border:0; padding:8px; cursor:pointer;
      color:#1689BD; font-family:'Montserrat',sans-serif; font-weight:600; font-size:14px;
    }
    .linkbtn:hover{ text-decoration:underline; }

    /* ---------- cards ---------- */
    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--card-shadow);
      padding:22px;
    }

    /* ---------- chips / status pills ---------- */
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      padding:6px 11px; border-radius:999px;
      background:rgba(22,137,189,.10); color:#13658a;
      border:1px solid rgba(22,137,189,.18);
    }
    .chip.is-muted{ background:rgba(13,44,61,.05); color:var(--ink-soft); border-color:var(--line); }
    .chip.is-mint{ background:rgba(80,207,176,.16); color:#1c8a72; border-color:rgba(80,207,176,.30); }

    /* ---------- inputs ---------- */
    .field{ margin-bottom:14px; }
    .field label{
      display:block; font-size:12px; font-weight:700; letter-spacing:.04em;
      text-transform:uppercase; color:var(--ink-soft); margin-bottom:7px;
    }
    .field input{
      width:100%; font-family:'Montserrat',sans-serif; font-size:16px; color:var(--ink);
      padding:15px 14px; border-radius:13px; border:1px solid var(--line);
      background:#fff; outline:none; transition:border-color .12s, box-shadow .12s;
    }
    .field input:focus{ border-color:var(--accent-mint); box-shadow:0 0 0 4px rgba(80,207,176,.18); }
    .pw-wrap{ position:relative; }
    .pw-wrap .reveal{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      background:none; border:0; padding:8px; cursor:pointer; color:var(--ink-soft);
      display:flex; align-items:center;
    }

    /* ---------- messages ---------- */
    .msg{ border-radius:12px; padding:12px 14px; font-size:14px; font-weight:500; margin-bottom:14px; }
    .msg.error{ background:rgba(214,69,69,.08); color:#a23030; border:1px solid rgba(214,69,69,.18); }
    .msg.ok{ background:rgba(80,207,176,.12); color:#1c8a72; border:1px solid rgba(80,207,176,.28); }

    /* ---------- auth layout ---------- */
    .auth-wrap{ min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 18px; }
    .brand-lockup{ text-align:center; margin-bottom:20px; }
    .brand-lockup .eyebrow{ font-size:11px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); }
    .brand-lockup h1{ font-size:34px; color:var(--ink); margin-top:6px; }
    .brand-lockup .accent{ color:#1689BD; }
    .auth-card{ width:100%; max-width:400px; }

    /* ---------- app header band ---------- */
    .topband{
      background:var(--navy-grad);
      color:#fff;
      padding:18px 18px calc(18px + env(safe-area-inset-bottom,0));
      padding-top:calc(18px + env(safe-area-inset-top,0));
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .topband .left .eyebrow{ font-size:10px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.62); }
    .topband .left h2{ font-size:22px; color:#fff; margin-top:2px; }
    .topband .right{ display:flex; align-items:center; gap:10px; }
    .who{ text-align:right; }
    .who .name{ font-size:14px; font-weight:700; }
    .who .role{ font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.6); }
    .iconbtn{
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.16);
      color:#fff; border-radius:12px; width:42px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .iconbtn:active{ transform:translateY(1px); }

    .page{ max-width:680px; margin:0 auto; padding:20px 18px 60px; }
    .section-label{ font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin:22px 4px 10px; }

    .stack > * + *{ margin-top:14px; }

    .empty{ text-align:center; color:var(--ink-soft); }
    .empty .big{ font-family:'Anton',sans-serif; text-transform:uppercase; letter-spacing:.02em; color:var(--ink); font-size:20px; margin-bottom:6px; }
    .empty p{ margin:0; font-size:14px; }

    .tile{ display:flex; align-items:center; gap:14px; }
    .tile .ico{ width:46px; height:46px; border-radius:13px; background:var(--grad-primary); color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
    .tile .body{ flex:1 1 auto; }
    .tile .body .t{ font-weight:700; font-size:16px; }
    .tile .body .s{ font-size:13px; color:var(--ink-soft); }

    /* ---------- admin: segmented tabs ---------- */
    .seg{ display:flex; gap:6px; background:rgba(13,44,61,.05); border:1px solid var(--line); border-radius:14px; padding:5px; margin:4px 0 4px; }
    .seg button{ flex:1; border:0; background:none; cursor:pointer; font-family:'Montserrat',sans-serif; font-weight:700; font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); padding:11px 8px; border-radius:10px; }
    .seg button.on{ background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(13,44,61,.06); }

    /* ---------- admin: rows ---------- */
    .row-between{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .client-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; }
    .client-row .nm{ font-weight:700; font-size:15px; }
    .client-row .em{ font-size:13px; color:var(--ink-soft); word-break:break-all; }
    .status-select{ font-family:'Montserrat',sans-serif; font-weight:700; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink); border:1px solid var(--line); border-radius:999px; padding:7px 10px; background:#fff; cursor:pointer; }
    .barbtn{ display:inline-flex; align-items:center; gap:8px; width:auto; padding:11px 16px; min-height:0; font-size:14px; border-radius:12px; }
    .backbtn{ display:inline-flex; align-items:center; gap:6px; background:none; border:0; cursor:pointer; color:var(--ink-soft); font-weight:600; font-size:14px; padding:6px 4px; }
    .spinner{ color:var(--ink-soft); font-size:14px; text-align:center; padding:18px; }

    /* ---------- video ---------- */
    .video-wrap{ position:relative; width:100%; padding-top:56.25%; background:#0d2c3d; }
    .video-wrap iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
    .no-video{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.55); font-size:13px; gap:6px; }

    /* ---------- section headers ---------- */
    .sec-head{ font-family:'Anton',sans-serif; text-transform:uppercase; letter-spacing:.02em; font-size:18px; color:var(--ink); margin:24px 4px 12px; display:flex; align-items:center; gap:10px; }
    .sec-head .num{ width:26px; height:26px; border-radius:8px; background:var(--grad-primary); color:#fff; font-family:'Montserrat',sans-serif; font-weight:800; font-size:13px; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }

    /* ---------- exercise card (client view) ---------- */
    .ex-card{ overflow:hidden; padding:0; }
    .ex-card .ex-body{ padding:15px 17px; }
    .ex-card .ex-name{ font-weight:700; font-size:16px; margin-bottom:8px; }
    .ex-meta{ display:flex; gap:8px; flex-wrap:wrap; }
    .ex-notes{ font-size:14px; color:var(--ink-soft); margin-top:10px; white-space:pre-wrap; line-height:1.5; }
    .ex-purpose{ font-size:14px; color:var(--ink); margin-top:10px; line-height:1.5; }
    .ex-lbl{ display:inline-block; font-weight:800; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#1689BD; margin-right:8px; }

    /* ---------- editor rows ---------- */
    .ex-edit{ display:flex; align-items:center; gap:8px; padding:11px 12px; }
    .ex-edit .grow{ flex:1; min-width:0; }
    .ex-edit .t{ font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ex-edit .s{ font-size:12px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .minibtn{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }
    .minibtn:active{ transform:translateY(1px); }
    .minibtn:disabled{ opacity:.35; cursor:default; }
    .minibtn.danger{ color:#a23030; }
    .addrow{ width:100%; border:1px dashed rgba(13,44,61,.20); background:rgba(13,44,61,.02); color:#1689BD; font-weight:700; font-size:14px; padding:13px; border-radius:12px; cursor:pointer; }
    .addrow:active{ transform:translateY(1px); }
    .clientpick{ cursor:pointer; min-width:0; }
    .field textarea{ width:100%; font-family:'Montserrat',sans-serif; font-size:16px; color:var(--ink); padding:14px; border-radius:13px; border:1px solid var(--line); background:#fff; outline:none; resize:vertical; }
    .field textarea:focus{ border-color:var(--accent-mint); box-shadow:0 0 0 4px rgba(80,207,176,.18); }

    /* ---------- motion ---------- */
    @keyframes fadeUp{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
    .fade-up{ animation:fadeUp .4s ease both; }
    @media (prefers-reduced-motion: reduce){ .fade-up{ animation:none; } }

    /* ---------- print / save as PDF ---------- */
    .print-head, .print-link{ display:none; }
    @media print{
      body{ background:#fff !important; }
      .topband, button, .seg, .video-wrap, .ex-meta .is-muted{ display:none !important; }
      .page{ padding:0 !important; max-width:none; }
      .print-head{ display:block; margin:0 0 14px; }
      .print-head .ph-title{ font-family:'Anton',sans-serif; text-transform:uppercase; letter-spacing:.02em; font-size:22px; color:#0d2c3d; }
      .print-head .ph-sub{ font-size:12px; color:#555; margin-top:2px; }
      .print-link{ display:block; font-size:11px; color:#666; margin-top:8px; word-break:break-all; }
      .card{ box-shadow:none !important; border:1px solid #ccc !important; break-inside:avoid; border-radius:8px; }
      .ex-card{ padding:0; }
      .ex-card .ex-body{ padding:10px 12px; }
      .sec-head{ margin:18px 0 8px; }
      .chip{ border:1px solid #bbb !important; background:#fff !important; color:#333 !important; }
    }

    /* small helpers */
    .center{ text-align:center; }
    .mt8{ margin-top:8px; } .mt16{ margin-top:16px; } .mt24{ margin-top:24px; }
    .muted{ color:var(--ink-soft); font-size:13px; }
  </style>
</head>
